services:
  finance-blog-cms-prod:
    build:
      context: ../../
      dockerfile: docker/production/Dockerfile
      secrets:
        - env-file
    image: finance-blog-cms-prod
    ports:
      - "3003:3000"
    env_file:
      - ../../.env.production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
secrets:
  env-file:
    file: ../../.env.production