services:
  finance-blog-cms-dev:
    build:
      context: ../../
      dockerfile: docker/development/Dockerfile
    image: finance-blog-cms-dev
    ports:
      - "3001:3000"
    env_file:
      - ../../.env.development
    volumes:
      - ../../:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s